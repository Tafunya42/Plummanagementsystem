
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Plum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080910;
            --bg-2: #0e1020;
            --bg-3: #141628;
            --purple: #8B2BE2;
            --purple-l: #a84df5;
            --lime: #C4E000;
            --lime-d: #9bb300;
            --amber: #F5A300;
            --white: #F0EFF8;
            --muted: #7B7B9A;
            --border: rgba(255,255,255,0.07);
            --card-bg: rgba(255,255,255,0.04);
            --shadow-purple: 0 0 60px rgba(139,43,226,0.35);
            --shadow-lime: 0 0 40px rgba(196,224,0,0.2);
            --r-sm: 8px;
            --r-md: 14px;
            --r-lg: 22px;
            --r-xl: 32px;
            --font-head: 'Unbounded', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(139,43,226,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(196,224,0,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 2rem;
            transition: var(--transition);
        }

        .login-container:hover {
            border-color: var(--purple);
            box-shadow: var(--shadow-purple);
        }

        h1 {
            font-family: var(--font-head);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--white) 0%, var(--purple-l) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--white);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 0.95rem;
        }

        input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 2px rgba(139,43,226,0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            background: var(--lime);
            color: #0a0b10;
            border: none;
            border-radius: var(--r-md);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lime);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .link-primary {
            color: var(--lime);
            text-decoration: none;
            font-weight: 600;
        }

        .link-primary:hover {
            color: var(--purple-l);
        }

        .error-msg {
            color: #f87171;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .login-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Welcome Back</h1>
        <p class="sub">Sign in to your Plum account</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary"><i data-lucide="log-in"></i> Sign In</button>
            <div id="loginError" class="error-msg"></div>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html" class="link-primary">Sign up here</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorDiv = document.getElementById('loginError');

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                const users = JSON.parse(localStorage.getItem('plum_users')) || [];
                const user = users.find(u => u.email === email && u.password === password);

                if (!user) {
                    errorDiv.textContent = 'Invalid email or password.';
                    return;
                }

                // Store current user
                localStorage.setItem('plum_current_user', JSON.stringify({
                    id: user.id,
                    email: user.email,
                    userType: user.userType
                }));

                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            });
        });
    </script>
</body>
</html>
