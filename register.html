<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Plum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-container">
        <h1>Create your Plum account</h1>
        <p class="sub">Join the sweetest spot for bookings</p>

        <form id="registerForm">
            <!-- Step 1: Basic info -->
            <div class="form-step active" id="step1">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <div class="form-group">
                    <label>I am a...</label>
                    <div class="radio-group" id="userTypeGroup">
                        <div class="radio-option" data-type="artist">
                            <input type="radio" name="userType" value="artist" id="artistRadio" required>
                            <label for="artistRadio">Artist</label>
                        </div>
                        <div class="radio-option" data-type="organizer">
                            <input type="radio" name="userType" value="organizer" id="organizerRadio">
                            <label for="organizerRadio">Event Organizer</label>
                        </div>
                    </div>
                </div>
                <div class="step-buttons">
                    <button type="button" class="btn-primary" id="nextStep1">Continue</button>
                </div>
            </div>

            <!-- Step 2: Artist profile -->
            <div class="form-step" id="step2-artist">
                <div class="form-group">
                    <label>Full Name / Stage Name</label>
                    <input type="text" id="artistName" placeholder="e.g., The Jazz Collective">
                </div>
                <div class="form-group">
                    <label>Bio / Description</label>
                    <textarea id="artistBio" rows="3" placeholder="Tell us about your talent, experience, and style..."></textarea>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="artistCategory">
                        <option>Musician</option>
                        <option>DJ</option>
                        <option>Photographer</option>
                        <option>Makeup Artist</option>
                        <option>Comedian</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Skills / Tags (comma separated)</label>
                    <input type="text" id="artistTags" placeholder="e.g., Jazz, Wedding, Corporate">
                </div>
                <div class="form-group">
                    <label>Base Price ($ per event)</label>
                    <input type="number" id="artistPrice" placeholder="e.g., 1500">
                </div>
                <div class="form-group">
                    <label>Portfolio URL (optional)</label>
                    <input type="url" id="artistPortfolio" placeholder="https://...">
                </div>
                <div class="step-buttons">
                    <button type="button" class="btn-secondary" id="backStep2">Back</button>
                    <button type="button" class="btn-primary" id="registerArtist">Register</button>
                </div>
            </div>

            <!-- Step 2: Organizer profile -->
            <div class="form-step" id="step2-organizer">
                <div class="form-group">
                    <label>Company/Organization Name</label>
                    <input type="text" id="orgName" placeholder="e.g., Events Co.">
                </div>
                <div class="form-group">
                    <label>Contact Person</label>
                    <input type="text" id="orgContact" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="orgPhone" placeholder="+1 234 567 890">
                </div>
                <div class="form-group">
                    <label>Event Types (comma separated)</label>
                    <input type="text" id="orgEventTypes" placeholder="e.g., Weddings, Corporate, Private Parties">
                </div>
                <div class="form-group">
                    <label>Company Description</label>
                    <textarea id="orgDesc" rows="3" placeholder="Tell us about your events and needs..."></textarea>
                </div>
                <div class="form-group">
                    <label>Website (optional)</label>
                    <input type="url" id="orgWebsite" placeholder="https://...">
                </div>
                <div class="step-buttons">
                    <button type="button" class="btn-secondary" id="backStep2Org">Back</button>
                    <button type="button" class="btn-primary" id="registerOrganizer">Register</button>
                </div>
            </div>
        </form>
    </div>

    <script src="register.js"></script>
</body>
</html>
